<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
  </head>
  <body>
    <header>
      <h1>Panel de Administración</h1>
      <a href="index.html">Volver a la Tienda</a>
    </header>

    <main>
      <section>
        <h2>Inventario</h2>

        <table border="1">
          <thead>
            <tr>
              <th>ID</th>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>
                <img src="https://placehold.co/600x400" alt="Hamburguesa" width="50" />
              </td>
              <td>Hamburguesa</td>
              <td>Comida</td>
              <td>$2500</td>
              <td>10</td>
              <td><a href="#">Editar</a> | <a href="#">Eliminar</a></td>
            </tr>
            <tr>
              <td>2</td>
              <td><img src="https://placehold.co/600x400" alt="Pizza" width="50" /></td>
              <td>Pizza</td>
              <td>Comida</td>
              <td>$3000</td>
              <td>5</td>
              <td><a href="#">Editar</a> | <a href="#">Eliminar</a></td>
            </tr>
            <tr>
              <td>3</td>
              <td><img src="https://placehold.co/600x400" alt="Bebida" width="50" /></td>
              <td>Bebida</td>
              <td>Bebidas</td>
              <td>$1200</td>
              <td>20</td>
              <td><a href="#">Editar</a> | <a href="#">Eliminar</a></td>
            </tr>
          </tbody>
        </table>
      </section>

      <section>
          <h2>Agregar Producto Rápido</h2>

          <form>
            <div>
              <label>Nombre:</label>
              <input type="text" required />
            </div>

            <div>
              <label>Precio:</label>
              <input type="number" required />
            </div>

            <div>
              <label>Categoría:</label>
              <select>
                <option>Hamburguesas</option>
                <option>Pizzas</option>
                <option>Bebidas</option>
              </select>
            </div>

            <button type="submit">Agregar</button>
          </form>
      </section>
    </main>
  </body>
</html>
