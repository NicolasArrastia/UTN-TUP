<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store</title>
  </head>

  <body>
    <header>
      <h1>Food Store</h1>
      <nav>
        <a href="#">Inicio</a>
        <a href="#">Mis Pedidos</a>
        <a href="#">Carrito</a>
        <a href="admin.html">Panel Admin</a>
      </nav>
    </header>

    <input type="checkbox" name=""  id="">

    <aside>
      <h2>Categorías</h2>
      <ul>
        <li><a href="#">Hamburguesas</a></li>
        <li><a href="#">Pizzas</a></li>
        <li><a href="#">Bebidas</a></li>
      </ul>
    </aside>

    <main>
      <section>
        <form>
          <input type="search" placeholder="Buscar producto..." />
          <button type="submit">Buscar</button>
        </form>
      </section>

      <section>
        <h2>Productos</h2>

        <article>
          <img src="https://placehold.co/600x400" alt="Hamburguesa clásica" width="150" />

          <p>Carne, lechuga y tomate.</p>
          <strong>$2500</strong>
          <button>Agregar</button>
        </article>

        <article>
          <img src="https://placehold.co/600x400" alt="Pizza mozzarella" width="150" />
          <h3>Pizza Muzzarella</h3>
          <p>Queso mozzarella y salsa.</p>
          <strong>$3000</strong>
          <button>Agregar</button>
        </article>
      </section>
    </main>

    <footer>
      <p>Contacto: foodstore@email.com</p>
    </footer>
  </body>
</html>
